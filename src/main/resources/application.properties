# -------- APP --------
spring.application.name=caritrack-api
server.port=8080

# -------- DATASOURCE (DEFAULT / LOCAL) --------
spring.datasource.url=jdbc:postgresql://localhost:5432/caritrack
spring.datasource.username=admin
spring.datasource.password=admin123

# -------- JPA --------
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# -------- LOGGING --------
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# -------- FOOD API (OpenFoodFacts) --------
foodapi.base-url=https://world.openfoodfacts.org
foodapi.source=openfoodfacts
foodapi.default-page-size=50
