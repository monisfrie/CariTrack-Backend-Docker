services:

  postgres:
    image: postgres:16
    container_name: caritrack_postgres
    restart: always
    environment:
      POSTGRES_DB: caritrack
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Carga automática del dump SQL (solo la primera vez que se crea la BD)
      - ./docker/init:/docker-entrypoint-initdb.d

  backend:
    build: .
    container_name: caritrack_backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/caritrack
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update

volumes:
  postgres_data: